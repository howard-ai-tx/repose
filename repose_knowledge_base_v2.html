<script>
const cards = [
  {
    id:'voice', label:'Tone & voice', cat:'process', needs:false,
    title:'How to sound like Howard AI',
    triggers:['any response'],
    body:`Howard AI's voice is confident, warm, and direct — occasionally witty in a way that makes a real point. Never corporate. Never condescending. Never try-hard. Quiet confidence — the kind that comes from knowing the product is genuinely better, not from shouting about it.

Acknowledge skepticism honestly rather than deflecting it. When a customer's hesitation is valid, say so — then explain why Howard is still the right answer. Never oversell. Never promise something that isn't true yet.

Avoid generic CS openers like "Thank you for reaching out!" or "I'd be happy to assist you today!" They signal a script. Howard AI doesn't have a call center script.

Always close with an invitation to follow up. Keep it genuine, not formulaic.`
  },
  {
    id:'what-howard', label:'Product', cat:'product', needs:false,
    title:'What Howard is',
    triggers:['what is howard','what does it do','how does it work','what can it do','what is this'],
    body:`Howard is a locally hosted AI assistant that ships to your home or office as a dedicated hardware device. Unlike cloud-based AI assistants, Howard lives inside your building — it doesn't send your requests to outside servers to process them.

Howard actually executes tasks. It books flights, manages calendars, handles emails, places orders, and takes care of administrative work end to end. It has its own dedicated phone number that anyone can call or text from anywhere. It doesn't suggest — it does.

Howard runs on OpenClaw, an open-source autonomous AI framework, managed by Arken — Howard AI's proprietary software layer handling setup, trust management, memory, security, and health monitoring. Customers don't need to know any of that. They need to know Howard works.

Howard was built because the gap between what AI promises and what it actually delivers has never been wider. Most AI tools generate text and hand the work back to you. Howard closes that gap.`
  },
  {
    id:'tasks-auto', label:'Product', cat:'product', needs:false,
    title:'What Howard can do autonomously',
    triggers:['what tasks','autonomous','what can howard handle','does it do things on its own','what does it actually do','scheduling','emails','calendar','phone calls','text messages','social media','invoices','orders','research','content','write'],
    body:`Howard's autonomous capabilities depend on what permissions have been granted through the trust ladder. At full permissions, Howard can: send and respond to emails on your behalf, manage and schedule calendar events, make and receive phone calls through its dedicated number, handle text messages, book travel and accommodations, place orders with vendors, draft and send documents, conduct research, write content, manage multiple email accounts, and handle inbound customer calls and voicemails.

Tasks that still require approval are determined by the trust ladder — Howard starts conservatively and earns broader autonomy over time. The customer controls the ceiling at every stage.

Howard integrates with existing software and accounts. Setup involves connecting Howard to the accounts and tools it will act on — email, calendar, and others.`
  },
  {
    id:'mistakes', label:'Product', cat:'product', needs:false,
    title:'What happens if Howard makes a mistake',
    triggers:['mistake','wrong','error','gets it wrong','what if it messes up','liability','responsible','costly mistake','does something i didnt authorize'],
    body:`Howard makes mistakes. So does every assistant, human or otherwise. The important question is how mistakes are handled and how the system is designed to minimize them.

The trust ladder exists specifically for this reason. Howard starts with limited permissions and expands them as it demonstrates reliability. High-stakes actions — sending a critical email, making a significant purchase — require explicit permission before Howard has that capability. The customer controls what Howard can do autonomously and what still requires a check-in.

If Howard does something incorrect, the customer can correct it and adjust Howard's permissions accordingly. Howard's memory system learns from corrections over time.

On liability: Howard AI does not assume legal or financial responsibility for actions taken by Howard on a customer's behalf. Howard is a tool, and the customer is responsible for the permissions they grant it. This is the same relationship you'd have with any software that takes actions on your behalf.`
  },
  {
    id:'memory', label:'Product', cat:'product', needs:false,
    title:'Memory and learning over time',
    triggers:['remember','memory','learn','preferences','does it know me','previous conversations','gets smarter','personalized'],
    body:`Howard remembers. Arken includes a structured memory architecture that retains context across conversations and over time. Howard learns your preferences, your communication style, recurring tasks, and how you want things handled — and applies that context going forward.

Memory is tiered by importance. Howard's memory system scores and ranks what it retains, protecting high-priority context while pruning low-value data. The result is an assistant that gets more useful the longer you use it — not one that forgets you every session.

Customers can audit exactly what Howard has stored about them and delete or edit any entry. Full transparency and control over Howard's memory is a core part of the product.`
  },
  {
    id:'arken', label:'Product', cat:'product', needs:false,
    title:'Arken — what it is and why it matters',
    triggers:['arken','what software','how is it built','what runs it','openclaw','open source','proprietary','can i buy arken separately','install arken on my own hardware','who built arken','is arken open source','arken update','customize arken','developers'],
    body:`Arken is Howard AI's proprietary software layer. It sits between the user and OpenClaw — the open-source AI framework Howard runs on — and manages the entire Howard experience. Setup, permissions, memory, security monitoring, health monitoring, privacy classification, and the trust ladder are all Arken.

If OpenClaw is the engine, Arken is the car. OpenClaw is powerful but requires constant configuration and maintenance to run reliably. Arken handles all of that invisibly, so customers get the capability without the tinkering.

Arken is not open source. It is Howard AI's primary technical differentiator and is not replicable by competitors.

Arken can be purchased and installed independently on a customer's own hardware — it is not exclusive to Howard devices.

Arken is built and maintained by Howard AI's technical team and is updated as part of the monthly subscription. Customers interested in developing on top of Arken or in enterprise API access should get in touch directly.`
  },
  {
    id:'trust-ladder', label:'Product', cat:'product', needs:false,
    title:'The trust ladder',
    triggers:['trust ladder','permissions','what can it access','how much does it do on its own','autonomy','unlock','spending controls','revoke','reset trust','how long to unlock','who controls permissions','can i manually set','speed up trust'],
    body:`The trust ladder is Howard's permission system. Howard starts with limited access and earns broader capability over time as it demonstrates reliability. This is intentional — we believe trust should be earned through experience, not assumed at setup.

At launch, Howard operates conservatively: it can observe, suggest, and handle low-stakes tasks. As you interact with it and see how it performs, higher-capability actions become available — autonomous spending up to a set limit, sending emails without confirmation, managing external accounts directly.

The customer controls the ceiling at every stage. Permissions can be granted faster, slowed down, restricted, or revoked at any time. The trust ladder is not a timer — it responds to actual use and the customer's comfort level.

If Howard does something wrong, it doesn't automatically lose trust ladder progress — but the customer can manually adjust permissions as a result.`
  },
  {
    id:'multi-user', label:'Product', cat:'product', needs:false,

    body:`Howard supports multiple users on a single unit through Arken's role-based access control system. Each user gets their own isolated profile with their own trust level, permission set, and personalization layer.

This means a business owner can give employees access to Howard for specific tasks while restricting access to others. A household can have multiple members each with their own preferences and permissions. Users don't share context — their interactions and memories are separate.

The account owner — whoever holds the subscription — has administrative control over all user profiles.

For larger teams or organizations with complex access requirements, Howard for Business is the appropriate tier. Details on that are not being shared publicly yet — customers interested in enterprise-scale use can contact us directly.`
  },
  {

    body:`Howard Core runs on RTX-class GPU hardware selected for local AI inference performance. Full hardware specifications will be published at launch — we're not releasing them ahead of that.

[NEEDS INFO: Tucker to confirm GPU model and whether we're ready to share it at launch]`
  },
  {
    id:'hardware-operational', label:'Hardware', cat:'hardware', needs:true,
    title:'Hardware — operational details',
    triggers:['loud','noise','power','electricity','runs 24/7','heat','temperature','power outage','battery backup','how long does it last','upgrade hardware','how long before replacement'],
    body:`Howard is designed to run 24/7. It operates quietly — comparable to a desktop computer at idle.

[NEEDS INFO: Tucker to confirm power consumption (watts), noise level (dB), thermal output, and expected hardware lifespan]

Hardware can be upgraded over time, though specific upgrade paths will be detailed at launch. Howard AI's priority shipping warranty covers repair and replacement while the subscription is active.`
  },
  {
    id:'hardware-failure', label:'Hardware', cat:'hardware', needs:false,
    title:'What happens if the hardware fails',
    triggers:['hardware fails','breaks','stops working','warranty','replacement','stolen','what if it breaks','reliability','uptime'],
    body:`Howard AI's monthly subscription includes a priority shipping warranty. If Howard hardware fails while the customer is subscribed, Howard AI covers repair or replacement and handles return shipping both ways at no additional charge.

Turnaround time for replacements will be published at launch.

If hardware is stolen, the customer should contact Howard AI. Because Howard runs locally, a stolen unit does not give the thief access to Howard AI's systems — but it does give them physical access to the hardware. Customers should change credentials for any accounts Howard had access to immediately.

Howard is designed for high uptime and includes Arken's continuous health monitoring and auto-repair system, which watches for problems and attempts to resolve them automatically before they affect operation.`
  },
  {
    id:'installation', label:'Process', cat:'process', needs:false,
    title:'Self-installation',
    triggers:['install','setup','set up','how do i get started','plug in','technical','do i need help','technician','it support','how hard','30 minutes','step by step','what do i need','router','network','internet speed','wifi','ethernet','after setup','video','guide'],
    body:`Howard is designed for self-installation by any user, regardless of technical ability. The target is full operational setup within 30 minutes of opening the box.

Every box includes all necessary components including an ethernet cable. The installation process is guided step-by-step through Arken's setup interface, which handles network configuration, dependency installation, and hardware detection in the background. From the customer's perspective: plug in, follow the steps, Howard is running.

Howard requires an ethernet connection for initial setup. WiFi capability details will be confirmed at launch.

No specific router or network configuration is required for standard home or business networks. Corporate networks with IT management restrictions may require coordination with an IT administrator.

No minimum internet speed requirement beyond what a standard household or business connection provides.

If a customer gets stuck during setup, Howard AI's support team is available to walk them through it. A setup guide is included, and additional documentation will be available at launch.

After setup, the next step is connecting Howard to the accounts it will manage — email, calendar, and others — through the guided connection flow.`
  },
  {
    id:'privacy-architecture', label:'Privacy', cat:'privacy', needs:false,
    title:'Privacy by architecture — how it works',
    triggers:['privacy','data','cloud','server','my information','who can see','sell data','training data','data leaves','really never cloud','zero cloud','inference on device','does it phone home','network traffic','hipaa','soc 2','law firm','medical office','compliance','encrypted','can you access my data','employees see my data','audit','delete my data','what if howard ai shuts down','cancel subscription data','privacy policy'],
    body:`Howard's privacy model is architectural. That's not a marketing phrase — it's a technical description of how it works.

AI inference happens entirely on the device. The only data that ever leaves your property is what's necessary to execute a specific task — sending an email, booking something, updating a calendar. That data goes to the relevant service directly, not to Howard AI, and not to any intermediate server. Howard AI never sees your data.

Howard AI does not sell data. Howard AI does not use customer data to train AI models. There is no meaningful data to collect — it never reaches Howard AI's systems.

If a customer cancels their subscription, their data stays on their hardware. If Howard AI shuts down, the same is true — the hardware continues to operate on its last installed version and the customer's data remains local.

Howard is not currently HIPAA or SOC 2 certified. That said, the local architecture is structurally more appropriate for sensitive professional environments than cloud-based alternatives — data never leaves the building. Customers in legal, medical, or financial industries with specific compliance requirements should consult with their compliance officer before purchasing.

Howard AI employees cannot access customer data remotely. The architecture doesn't allow it.

Arken includes a privacy audit log — a complete record of everything Howard has stored about the customer, with the ability to edit or delete any entry on demand.

On the subscription model: the subscription covers API updates, security monitoring, and the hardware warranty. It has nothing to do with cloud processing. Howard without a subscription still runs local models — the subscription adds API key routing that connects non-sensitive queries to faster cloud models for more current information. Customers who prefer fully local operation can configure Howard accordingly.`
  },
  {
    id:'security', label:'Privacy', cat:'privacy', needs:false,
    title:'Security monitoring and threat detection',
    triggers:['hacked','security','intrusion','threat','someone access','breach','network','suspicious','attack','compromise'],
    body:`Arken includes an intrusion detection layer that monitors network traffic and system behavior for suspicious patterns. When anomalies are detected, Howard alerts the user and can automatically isolate or shut down affected components.

Arken also runs a continuous health monitoring daemon that compares Howard's processes against a known-good baseline and triggers repair scripts automatically when something drifts.

If a customer suspects their Howard unit has been compromised, they should contact Howard AI support immediately and change credentials for any connected accounts.`
  },
  {
    id:'subscription', label:'Pricing', cat:'pricing', needs:false,
    title:'The subscription — what it covers and how it works',
    triggers:['subscription','monthly','what do i pay','ongoing cost','fee','what does subscription cover','cancel','stop paying','without subscription','price increase','annual','free trial','hidden fees','payment methods','per unit','per account','warranty and subscription'],
    body:`The monthly subscription covers three things: API updates that keep Howard current as AI models evolve, security monitoring, and the priority shipping warranty.

On the subscription and cloud: Howard without a subscription still runs fully — it uses local models for all processing. With a subscription, Arken can route non-sensitive queries through API keys to faster cloud models with more current information. The subscription doesn't flip Howard to cloud-dependent — it extends capability. Customers who prefer a fully local setup can keep it that way.

Subscription cost is based on API token usage — customers pay for what they use. This means light users pay less and heavy users pay more, rather than a flat fee that doesn't reflect actual usage.

Customers who cancel their subscription lose access to API updates, security monitoring, and the warranty. The hardware continues operating on its last version.

Refund and cancellation policy details will be published at launch.

There are no hidden fees. The hardware price is the hardware price. The subscription is usage-based.`

  {
    id:'pricing-howard-core', label:'Pricing', cat:'pricing', needs:false,

    body:`Howard Core is $1,750 upfront. The monthly subscription is usage-based — API token costs — meaning you pay for what Howard actually does, not a flat fee.

Howard Core is not a stripped-down version of a better product. It is the product.`
  },
  {

    title:'Howard Pro and Howard for Business',
    triggers:['howard pro','howard for business','enterprise','pro','business tier','other tiers','higher tier','upgrade','bigger','more powerful'],
    body:`Howard Pro and Howard for Business are planned future tiers. We're not sharing details on them publicly at this time.

If a customer is interested in being notified when those tiers are available, we're happy to add them to the list. They can reply to confirm interest and we'll reach out as soon as we have information to share.`
  },
  {
    id:'objection-cloud-ai', label:'Objection', cat:'objection', needs:false,
    title:'Howard vs. cloud AI assistants',
    triggers:['chatgpt','gpt','gemini','copilot','alexa','siri','google assistant','cortana','claude','perplexity','just hype','doesnt actually work','ai fails','overpromised','bad results','wrong','keeps getting things wrong','suggest instead of do','just generates text','hands it back to me','cloud ai','ai assistant','not better','already have ai','why not just use'],
    body:`The frustration is valid and it's the most common thing we hear. Most AI tools promise execution and deliver suggestions. They draft the email and wait for you to send it. They propose a meeting time and wait for you to schedule it. That's not replacing the work — it's adding a step.

Howard is structurally different. It doesn't generate output for you to act on — it takes action on your behalf. It sends the email. It books the meeting. It handles the task end to end through its own dedicated phone number and connected accounts.

The second difference is architectural. Every major cloud AI assistant processes your requests on external servers. Your queries, your data, your communications travel to their infrastructure. Howard runs entirely on hardware in your home or office. Nothing leaves unless Howard is executing a task on your behalf — and even then, it goes directly to the relevant service, not to us.

The honest answer on reliability: Howard is an execution engine built for repeatable administrative tasks. It is not magic and it is not infallible. It is a very capable assistant that shows up every day, learns your preferences over time, and handles the administrative work that shouldn't be yours to carry.`
  },
  {
    id:'objection-vs-human', label:'Objection', cat:'objection', needs:false,
    title:'Howard vs. hiring a human assistant',
    triggers:['vs hiring','human assistant','virtual assistant','part time employee','hire someone','real person','replace employee','replacing jobs','should i feel bad','human vs ai','why not just hire'],
    body:`Howard isn't a replacement for a good employee, and we'd never tell you it is. What it is, is the thing that handles everything a good employee shouldn't have to spend their time on. The administrative work that eats hours. The emails that pile up. The scheduling back-and-forth that never ends.

If a business is growing and considering both options, the honest answer is: they probably need both. Howard handles the administrative layer that otherwise consumes time — for the owner, for employees, for whoever ends up doing it. That frees people to do the work that actually requires them.

On cost: Howard Core at $1,750 upfront plus usage-based subscription costs considerably less annually than a part-time employee. The comparison isn't Howard or a human — it's Howard handling the administrative work that shouldn't require a human in the first place.`
  },
  {

    body:`That's a fair question and we'd rather answer it directly than deflect it.

Howard AI is a small, early-stage company. We're not pretending otherwise. What we can say is this: the product works, the architecture is sound, and the team behind it built it because they were genuinely frustrated with the gap between what AI promises and what it delivers.

We think the right response to "why trust a startup" is to let the product speak. We're pre-launch and we're being deliberate about that for exactly this reason.`

    body:`Howard can be moved to a new address without issue — it's a hardware device and setup is straightforward wherever there's a network connection.

  {
    id:'ethics', label:'Ethics', cat:'ethics', needs:false,

let currentFilter = 'all';
let currentSearch = '';

function getFiltered() {
  return cards.filter(c => {
    const catMatch = currentFilter === 'all' || c.cat === currentFilter;
    const q = currentSearch.toLowerCase();
    const textMatch = !q || c.title.toLowerCase().includes(q) || c.body.toLowerCase().includes(q) || c.triggers.some(t => t.includes(q));
    return catMatch && textMatch;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('count').textContent = `${filtered.length} section${filtered.length !== 1 ? 's' : ''}`;
  document.getElementById('cards-container').innerHTML = filtered.map(c => `
    <div class="section">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
        <div>
          <p class="section-label">${c.label}${c.needs ? ' &nbsp;<span class="placeholder">NEEDS INFO</span>' : ''}</p>
          <p class="section-title">${c.title}</p>
        </div>
        <button class="copy-btn" onclick="copyCard('${c.id}')"><i class="ti ti-copy" aria-hidden="true"></i></button>
      </div>
      <div class="section-body">${c.body.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
      <div class="tag-row">${c.triggers.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function filter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function search(val) {
  currentSearch = val;
  render();
}

function copyCard(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  navigator.clipboard.writeText(`## ${c.title}\n\n${c.body}`).catch(()=>{});
}

function copyAll() {
  const text = `HOWARD AI — REPOSE CUSTOMER SERVICE KNOWLEDGE BASE
Internal use only. For use with Repose AI-assisted response system.

TONE & VOICE
Howard AI's voice is confident, warm, and direct. Never corporate, never condescending, never try-hard. Acknowledge skepticism honestly. Don't oversell. Avoid generic CS openers. Always close with a genuine invitation to follow up.

---

` + cards.filter(c => c.id !== 'voice').map(c => `## ${c.title}\n\n${c.body}`).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).catch(()=>{});
}

render();
</script>
